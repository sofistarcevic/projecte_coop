<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Agenda de Cites</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div>
            <h1 id="doctor-welcome">Dr.</h1>
            <p id="doctor-specialty-title" class="subtitle"></p>
        </div>
        <button class="btn-logout" onclick="logout()">➜] Tancar Sessió</button>
    </header>

    <nav class="tab-menu">
        <a href="metge_pacients.html" class="tab-btn">Gestió de Pacients</a>
        <a href="metge_cites.html" class="tab-btn active">Agenda de Cites</a>
    </nav>

    <main class="doctor-layout">
        <div class="side-panel">
            <div class="card">
                <h3>Programar Nova Cita</h3>
                <form id="schedule-appointment-form">
                    <div class="form-group">
                        <label>Selecciona el Pacient:</label>
                        <select id="appointment-patient-select" required>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Data i Hora:</label>
                        <input type="datetime-local" id="appointment-date" required>
                    </div>
                    <div class="form-group">
                        <label>Motiu / Notes de la Cita:</label>
                        <textarea id="appointment-reason" rows="3" placeholder="Ex: Control analítica, revisió post-operatòria..." required></textarea>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Reservar Cita</button>
                </form>
            </div>
        </div>

        <div class="main-panel card">
            <h3>Agenda de Cites Planificades</h3>
            <p class="subtitle" style="color: var(--text-muted); margin-bottom: 15px;">📅 Llistat complet de consultes programades al sistema.</p>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Pacient</th>
                            <th>Data i Hora</th>
                            <th>Motiu / Notes</th>
                            <th style="text-align: right;">Acció</th>
                        </tr>
                    </thead>
                    <tbody id="appointments-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="db.js"></script>
    <script src="metge.js"></script>
</body>
</html>
