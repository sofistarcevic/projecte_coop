<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Inici de Sessió</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <h1 id="title-clinic" style="text-align: center; color: #2b6cb0; margin-top: 0; font-size: 24px;">Carregant centre...</h1>
        <h2 style="text-align: center; margin-bottom: 25px; font-size: 14px; color: #718096;">Accés al Sistema</h2>
        
        <form id="login-form">
            <div class="form-group" style="margin-bottom: 15px;">
                <label for="username" style="display:block; margin-bottom:5px; font-weight:600;">Nom d'usuari:</label>
                <input type="text" id="username" style="width:100%; padding:8px; border:1px solid #e2e8f0; border-radius:4px;" required>
            </div>
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label for="password" style="display:block; margin-bottom:5px; font-weight:600;">Contrasenya:</label>
                <input type="password" id="password" style="width:100%; padding:8px; border:1px solid #e2e8f0; border-radius:4px;" required>
            </div>
            
            <button type="submit" class="btn-primary" style="width:100%; padding:10px; background:#2b6cb0; color:#fff; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">
                Iniciar sessió
            </button>
            
            <p id="login-error" style="color: #e53e3e; font-size: 13px; text-align: center; margin-top: 15px; display: none;">
                Credencials incorrectes. Torna-ho a provar.
            </p>
        </form>
    </div>

    <script src="index.js"></script>
</body>
</html>
